<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartun AI - Teman Ngobrol Lucu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(135deg, #f9d8b4 0%, #f8b4b4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Elemen kartun di background */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 1000px;
            z-index: 0;
        }

        .cloud1 {
            width: 200px;
            height: 80px;
            top: 50px;
            left: 20px;
        }

        .cloud1::before, .cloud1::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .cloud1::before {
            width: 100px;
            height: 100px;
            top: -50px;
            left: 20px;
        }

        .cloud1::after {
            width: 150px;
            height: 150px;
            top: -70px;
            left: 80px;
        }

        .cloud2 {
            width: 300px;
            height: 100px;
            bottom: 50px;
            right: 20px;
        }

        .cloud2::before, .cloud2::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .cloud2::before {
            width: 120px;
            height: 120px;
            top: -60px;
            left: 30px;
        }

        .cloud2::after {
            width: 180px;
            height: 180px;
            top: -80px;
            left: 120px;
        }

        .star {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            font-size: 20px;
            transform: rotate(15deg);
        }

        .star1 { top: 20%; right: 15%; }
        .star2 { bottom: 25%; left: 10%; transform: rotate(-10deg); }
        .star3 { top: 40%; left: 20%; }

        /* Container utama */
        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 60px 60px 40px 40px;
            border: 4px solid white;
            box-shadow: 0 20px 0 rgba(0, 0, 0, 0.1), 0 30px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        /* Header dengan karakter kartun */
        .header {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            padding: 30px 40px;
            border-bottom: 4px dashed white;
            display: flex;
            align-items: center;
            gap: 30px;
            position: relative;
        }

        .character {
            width: 120px;
            height: 120px;
            background: #fff5e6;
            border-radius: 60% 40% 50% 50% / 40% 50% 50% 60%;
            border: 4px solid white;
            position: relative;
            box-shadow: 0 8px 0 #ffb6b6;
            animation: bounce 3s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .eye-left, .eye-right {
            width: 25px;
            height: 30px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 35px;
            box-shadow: 0 3px 0 #ffb6b6;
        }

        .eye-left {
            left: 25px;
        }

        .eye-right {
            right: 25px;
        }

        .pupil-left, .pupil-right {
            width: 15px;
            height: 20px;
            background: #8b4513;
            border-radius: 50%;
            position: absolute;
            top: 5px;
            left: 5px;
            animation: lookAround 5s infinite;
        }

        @keyframes lookAround {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        .mouth {
            width: 40px;
            height: 20px;
            background: #ff6b6b;
            border-radius: 0 0 40px 40px;
            position: absolute;
            bottom: 30px;
            left: 40px;
            border: 2px solid white;
        }

        .blush-left, .blush-right {
            width: 20px;
            height: 12px;
            background: #ffb6b6;
            border-radius: 50%;
            position: absolute;
            bottom: 45px;
            opacity: 0.5;
        }

        .blush-left {
            left: 15px;
        }

        .blush-right {
            right: 15px;
        }

        .antenna {
            width: 8px;
            height: 40px;
            background: #ff9a9e;
            position: absolute;
            top: -30px;
            left: 56px;
            border-radius: 20px;
            border: 2px solid white;
        }

        .antenna::after {
            content: '';
            width: 20px;
            height: 20px;
            background: #ffd93e;
            border-radius: 50%;
            position: absolute;
            top: -15px;
            left: -6px;
            border: 2px solid white;
        }

        .header-text {
            flex: 1;
        }

        .header-text h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            text-shadow: 4px 4px 0 #ff8a8a, 6px 6px 0 rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .header-text p {
            font-size: 1.2rem;
            color: #4a4a4a;
            background: rgba(255, 255, 255, 0.5);
            padding: 10px 20px;
            border-radius: 40px;
            display: inline-block;
            border: 2px dashed white;
        }

        /* Area chat */
        .chat-area {
            height: 500px;
            overflow-y: auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.3);
            scroll-behavior: smooth;
        }

        /* Styling pesan */
        .message {
            display: flex;
            margin-bottom: 25px;
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 20px 25px;
            border-radius: 40px;
            position: relative;
            font-size: 1.1rem;
            line-height: 1.5;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.1);
        }

        .user .message-content {
            background: linear-gradient(135deg, #a8e6cf 0%, #d4edfa 100%);
            border: 3px solid white;
            border-bottom-right-radius: 10px;
        }

        .bot .message-content {
            background: linear-gradient(135deg, #ffd3b6 0%, #ffb6b9 100%);
            border: 3px solid white;
            border-bottom-left-radius: 10px;
        }

        .message-content i {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        .user .message-content i {
            color: #4a9b7a;
        }

        .bot .message-content i {
            color: #ff6b6b;
        }

        .timestamp {
            font-size: 0.8rem;
            margin-top: 5px;
            text-align: right;
            color: rgba(0, 0, 0, 0.4);
            font-family: 'Comic Neue', cursive;
        }

        /* Loading animation */
        .typing-indicator {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px 25px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 3px solid white;
            margin-bottom: 25px;
        }

        .typing-indicator span {
            width: 12px;
            height: 12px;
            background: #ff8a8a;
            border-radius: 50%;
            display: inline-block;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 25px 30px;
            background: rgba(255, 255, 255, 0.5);
            border-top: 4px dashed white;
            display: flex;
            gap: 20px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            color: #ff8a8a;
        }

        .message-input {
            width: 100%;
            padding: 18px 25px 18px 55px;
            border: 4px solid white;
            border-radius: 60px;
            font-size: 1.1rem;
            font-family: 'Comic Neue', cursive;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 6px 0 #ffb6b6;
            transition: all 0.2s;
        }

        .message-input:focus {
            outline: none;
            transform: translateY(2px);
            box-shadow: 0 4px 0 #ffb6b6;
        }

        .send-btn {
            width: 70px;
            height: 70px;
            border: 4px solid white;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #ff8a8a;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 4px 0 #ff8a8a;
        }

        .send-btn i {
            filter: drop-shadow(2px 2px 0 #ff6b6b);
        }

        /* Tombol fitur lucu */
        .fun-buttons {
            display: flex;
            gap: 15px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.3);
            border-top: 2px dashed white;
        }

        .fun-btn {
            background: white;
            border: 3px solid #ff9a9e;
            border-radius: 40px;
            padding: 10px 20px;
            font-family: 'Comic Neue', cursive;
            font-size: 1rem;
            font-weight: bold;
            color: #ff6b6b;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 0 #ffb6b6;
            transition: all 0.2s;
        }

        .fun-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #ffb6b6;
        }

        .fun-btn i {
            font-size: 1.1rem;
        }

        /* Responsif */
        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                text-align: center;
                padding: 20px;
            }

            .header-text h1 {
                font-size: 2.5rem;
            }

            .message-content {
                max-width: 85%;
            }

            .fun-buttons {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 500px) {
            .container {
                border-radius: 30px;
            }

            .input-area {
                padding: 15px;
            }

            .send-btn {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- Elemen latar kartun -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <i class="fas fa-star star star1"></i>
    <i class="fas fa-star star star2"></i>
    <i class="fas fa-star star star3"></i>

    <!-- Container utama -->
    <div class="container">
        <!-- Header dengan karakter -->
        <div class="header">
            <div class="character">
                <div class="eye-left">
                    <div class="pupil-left"></div>
                </div>
                <div class="eye-right">
                    <div class="pupil-right"></div>
                </div>
                <div class="mouth"></div>
                <div class="blush-left"></div>
                <div class="blush-right"></div>
                <div class="antenna"></div>
            </div>
            <div class="header-text">
                <h1>
                    <i class="fas fa-robot"></i> 
                    Kartun AI
                </h1>
                <p>
                    <i class="fas fa-laugh-squint"></i> 
                    Teman ngobrol lucu dan imut!
                </p>
            </div>
        </div>

        <!-- Area chat -->
        <div class="chat-area" id="chatArea">
            <!-- Pesan selamat datang -->
            <div class="message bot">
                <div class="message-content">
                    <i class="fas fa-smile-wink"></i>
                    Halo! Aku Kartun AI, teman ngobrolmu yang lucu! 
                    Ada yang ingin kamu tanyakan hari ini?
                    <div class="timestamp">
                        <i class="far fa-clock"></i> 
                        Baru saja
                    </div>
                </div>
            </div>
        </div>

        <!-- Tombol fitur lucu -->
        <div class="fun-buttons">
            <button class="fun-btn" onclick="setQuickQuestion('Ceritakan lelucon lucu!')">
                <i class="fas fa-face-smile"></i> Lelucon
            </button>
            <button class="fun-btn" onclick="setQuickQuestion('Apa kabar hari ini?')">
                <i class="fas fa-heart"></i> Apa kabar?
            </button>
            <button class="fun-btn" onclick="setQuickQuestion('Ceritakan fakta unik!')">
                <i class="fas fa-lightbulb"></i> Fakta Unik
            </button>
            <button class="fun-btn" onclick="clearChat()">
                <i class="fas fa-broom"></i> Bersihkan
            </button>
        </div>

        <!-- Input area -->
        <div class="input-area">
            <div class="input-wrapper">
                <i class="fas fa-pen-fancy"></i>
                <input type="text" class="message-input" id="messageInput" 
                       placeholder="Ketik pesan lucu di sini..." 
                       onkeypress="if(event.key === 'Enter') sendMessage()">
            </div>
            <button class="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Template loading -->
    <template id="typingTemplate">
        <div class="message bot" id="typingIndicator">
            <div class="typing-indicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </template>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        let sessionId = null;

        // Fungsi untuk menambahkan pesan ke chat
        function addMessage(text, isUser = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const now = new Date();
            const timeString = now.toLocaleTimeString('id-ID', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    <i class="fas ${isUser ? 'fa-user' : 'fa-robot'}"></i>
                    ${text}
                    <div class="timestamp">
                        <i class="far fa-clock"></i> 
                        ${timeString}
                    </div>
                </div>
            `;
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Fungsi untuk menampilkan loading
        function showTypingIndicator() {
            const template = document.getElementById('typingTemplate');
            const indicator = template.content.cloneNode(true);
            chatArea.appendChild(indicator);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Fungsi untuk menghapus loading
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // Fungsi untuk memanggil API
        async function callAPI(text) {
            try {
                const response = await fetch(`https://rynekoo-api.hf.space/text.gen/gemini/realtime?text=${encodeURIComponent(text)}`);
                const data = await response.json();
                
                if (data.success && data.result) {
                    // Simpan sessionId jika ada
                    if (data.result.sessionId) {
                        sessionId = data.result.sessionId;
                    }
                    return data.result.text;
                } else {
                    throw new Error('Gagal mendapatkan respons');
                }
            } catch (error) {
                console.error('Error:', error);
                return "Maaf, aku lagi sibuk main bola nih. Coba lagi ya!";
            }
        }

        // Fungsi utama mengirim pesan
        async function sendMessage() {
            const text = messageInput.value.trim();
            
            if (text === '') return;
            
            // Tambahkan pesan user
            addMessage(text, true);
            
            // Clear input
            messageInput.value = '';
            
            // Tampilkan loading
            showTypingIndicator();
            
            try {
                // Panggil API
                const response = await callAPI(text);
                
                // Hapus loading
                removeTypingIndicator();
                
                // Tambahkan respons bot
                addMessage(response, false);
            } catch (error) {
                removeTypingIndicator();
                addMessage("Ups! Ada yang error. Coba lagi ya!", false);
            }
        }

        // Fungsi untuk set pertanyaan cepat
        function setQuickQuestion(question) {
            messageInput.value = question;
            sendMessage();
        }

        // Fungsi untuk membersihkan chat
        function clearChat() {
            chatArea.innerHTML = `
                <div class="message bot">
                    <div class="message-content">
                        <i class="fas fa-smile-wink"></i>
                        Halo! Aku Kartun AI, teman ngobrolmu yang lucu! 
                        Ada yang ingin kamu tanyakan hari ini?
                        <div class="timestamp">
                            <i class="far fa-clock"></i> 
                            Baru saja
                        </div>
                    </div>
                </div>
            `;
        }

        // Tambahkan efek lucu saat hover karakter
        const character = document.querySelector('.character');
        const mouth = document.querySelector('.mouth');
        
        character.addEventListener('mouseenter', () => {
            mouth.style.width = '50px';
            mouth.style.height = '25px';
            mouth.style.background = '#ff8a8a';
        });
        
        character.addEventListener('mouseleave', () => {
            mouth.style.width = '40px';
            mouth.style.height = '20px';
            mouth.style.background = '#ff6b6b';
        });

        // Animasi tambahan untuk mata
        setInterval(() => {
            const pupils = document.querySelectorAll('.pupil-left, .pupil-right');
            pupils.forEach(pupil => {
                pupil.style.animation = 'none';
                setTimeout(() => {
                    pupil.style.animation = 'lookAround 5s infinite';
                }, 100);
            });
        }, 10000);
    </script>
</body>
</html>
